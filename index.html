<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRÉMAR — Gestion du Personnel</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #07111f;
  --navy2:  #0f1f38;
  --navy3:  #162d52;
  --gold:   #c9a227;
  --gold2:  #e6bc45;
  --cyan:   #3dd6f5;
  --border: rgba(255,255,255,0.10);
  --border-gold: rgba(201,162,39,0.35);
  --white:  #eef2f7;
  --text:   #b8c9de;
  --present:   #22c55e;
  --absent:    #ef4444;
  --permission:#f97316;
  --mission:   #3b82f6;
  --stage:     #a855f7;
  --reverse:   #6b7280;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:var(--navy);color:var(--text);font-family:"Source Sans 3",sans-serif;min-height:100vh;}

/* ── HEADER ── */
header{
  background:linear-gradient(135deg,#040c18 0%,var(--navy2) 55%,#0d2147 100%);
  border-bottom:2px solid var(--gold);
  padding:0 1.5rem;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  min-height:72px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 24px rgba(0,0,0,.55);
}
.logo{display:flex;align-items:center;gap:.9rem;flex-shrink:0;}
.logo img{height:52px;width:52px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(201,162,39,.4));}
.logo-text h1{font-family:"Rajdhani",sans-serif;font-size:1.15rem;font-weight:700;color:var(--white);letter-spacing:2px;line-height:1.25;}
.logo-text h1 span{color:var(--gold);display:block;font-size:.68rem;letter-spacing:3px;font-weight:500;}
.header-actions{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.48rem 1rem;border-radius:5px;border:none;cursor:pointer;font-family:"Rajdhani",sans-serif;font-weight:700;font-size:.84rem;letter-spacing:.8px;transition:all .2s;white-space:nowrap;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px);}
.btn-outline{background:rgba(61,214,245,.1);color:var(--cyan);border:1px solid rgba(61,214,245,.3);}
.btn-outline:hover{background:rgba(61,214,245,.2);transform:translateY(-1px);}

/* ── DASHBOARD ── */
.dashboard{
  display:grid;
  grid-template-columns:1fr;
  gap:1px;
  background:var(--border);
  border-bottom:1px solid var(--border);
}
.dash-top{
  display:flex;flex-wrap:nowrap;overflow-x:auto;
  background:rgba(0,0,0,.25);
}
.dash-top::-webkit-scrollbar{height:3px;}
.dash-top::-webkit-scrollbar-thumb{background:rgba(201,162,39,.3);}
.stat-card{
  flex:1 0 90px;
  padding:.7rem .8rem;text-align:center;cursor:pointer;
  transition:background .2s;border-bottom:3px solid transparent;
  border-right:1px solid var(--border);
}
.stat-card:last-child{border-right:none;}
.stat-card:hover{background:rgba(255,255,255,.04);}
.stat-card.active{border-bottom-color:var(--gold);background:rgba(201,162,39,.08);}
.stat-card .num{font-family:"Rajdhani",sans-serif;font-size:1.75rem;font-weight:700;line-height:1;}
.stat-card .lbl{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;opacity:.65;margin-top:2px;}
.s-total .num{color:var(--gold);}
.s-present .num{color:var(--present);}
.s-absent .num{color:var(--absent);}
.s-permission .num{color:var(--permission);}
.s-mission .num{color:var(--mission);}
.s-stage .num{color:var(--stage);}
.s-reverse .num{color:var(--reverse);}

/* ── ARMÉE EFFECTIFS ROW ── */
.armee-row{
  display:flex;flex-wrap:wrap;gap:0;
  background:rgba(0,0,0,.3);
}
.armee-block{
  flex:1 0 120px;
  padding:.6rem 1rem;
  display:flex;align-items:center;gap:.65rem;
  border-right:1px solid var(--border);
  cursor:pointer;transition:background .2s;
  position:relative;overflow:hidden;
}
.armee-block:last-child{border-right:none;}
.armee-block:hover{background:rgba(255,255,255,.04);}
.armee-block.active-armee{background:rgba(201,162,39,.07);}
.armee-block::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--ab-color,transparent);
}
.armee-block .ab-icon{font-size:1.3rem;flex-shrink:0;}
.armee-block .ab-info{min-width:0;}
.armee-block .ab-num{font-family:"Rajdhani",sans-serif;font-size:1.35rem;font-weight:700;color:var(--white);line-height:1;}
.armee-block .ab-name{font-size:.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--text);opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.armee-block .ab-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ab-color,var(--border));opacity:.4;}

/* ── TOOLBAR ── */
.toolbar{
  padding:.75rem 1.5rem;
  display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;
  background:rgba(0,0,0,.2);
  border-bottom:1px solid var(--border);
}
.search-box{
  flex:1 1 180px;min-width:160px;
  display:flex;align-items:center;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);border-radius:6px;
  padding:.42rem .8rem;gap:.5rem;
  transition:border-color .2s;
}
.search-box:focus-within{border-color:rgba(201,162,39,.5);}
.search-box input{background:none;border:none;outline:none;color:var(--white);font-family:"Source Sans 3",sans-serif;font-size:.88rem;width:100%;}
.search-box input::placeholder{color:rgba(255,255,255,.28);}
select.fsel{
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);color:var(--white);
  padding:.44rem .75rem;border-radius:6px;
  font-family:"Source Sans 3",sans-serif;font-size:.83rem;cursor:pointer;outline:none;
  transition:border-color .2s;
}
select.fsel:focus{border-color:rgba(201,162,39,.5);}
select.fsel option{background:var(--navy2);}
.toggle-btn{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text);padding:.44rem .9rem;border-radius:6px;cursor:pointer;
  font-family:"Rajdhani",sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.5px;
  transition:all .2s;white-space:nowrap;
}
.toggle-btn.active,.toggle-btn:hover{background:var(--gold);color:var(--navy);border-color:var(--gold);}

/* ── EXPORT BAR ── */
.export-bar{
  padding:.45rem 1.5rem;
  background:rgba(61,214,245,.06);
  border-bottom:1px solid rgba(61,214,245,.15);
  font-size:.78rem;color:var(--cyan);
  display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;
  font-family:"Rajdhani",sans-serif;letter-spacing:.8px;
}
.export-bar span{opacity:.7;}

/* ── MAIN ── */
main{padding:1.25rem 1.5rem;}

/* ── GROUP HEADER ── */
.group-header{
  display:flex;align-items:center;gap:.8rem;
  margin:1.5rem 0 .7rem;padding-bottom:.5rem;
  border-bottom:1px solid var(--border-gold);
}
.group-header h2{font-family:"Rajdhani",sans-serif;font-size:.95rem;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.group-count{background:rgba(201,162,39,.15);color:var(--gold);padding:.1rem .55rem;border-radius:20px;font-size:.75rem;font-family:"Rajdhani",sans-serif;font-weight:700;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);margin-bottom:1rem;}
table{width:100%;border-collapse:collapse;}
thead tr{background:rgba(255,255,255,.04);}
thead th{
  padding:.65rem .9rem;text-align:left;
  font-family:"Rajdhani",sans-serif;font-size:.68rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45);
  white-space:nowrap;border-bottom:1px solid var(--border);
}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
tbody tr:hover{background:rgba(255,255,255,.04);}
tbody td{padding:.62rem .9rem;font-size:.86rem;vertical-align:middle;}
.td-num{color:rgba(255,255,255,.25);font-size:.75rem;width:32px;}
.td-grade{font-family:"Rajdhani",sans-serif;font-weight:700;font-size:.84rem;color:var(--cyan);white-space:nowrap;}
.td-name{font-weight:600;color:var(--white);}
.td-mat{color:rgba(255,255,255,.38);font-size:.76rem;font-family:monospace;white-space:nowrap;}
.td-tel{color:rgba(255,255,255,.48);font-size:.78rem;white-space:nowrap;}
.td-fonction{font-size:.77rem;color:rgba(255,255,255,.58);max-width:190px;}
.armee-badge{display:inline-block;padding:.14rem .48rem;border-radius:3px;font-size:.68rem;font-family:"Rajdhani",sans-serif;font-weight:700;letter-spacing:.4px;white-space:nowrap;}
.status-badge{
  display:inline-flex;align-items:center;gap:.28rem;
  padding:.2rem .6rem;border-radius:20px;
  font-size:.71rem;font-family:"Rajdhani",sans-serif;font-weight:700;
  letter-spacing:.8px;cursor:pointer;transition:all .2s;white-space:nowrap;
  border:1px solid transparent;user-select:none;
}
.status-badge:hover{transform:scale(1.06);}
.st-present{background:rgba(34,197,94,.14);color:var(--present);border-color:rgba(34,197,94,.3);}
.st-absent{background:rgba(239,68,68,.14);color:var(--absent);border-color:rgba(239,68,68,.3);}
.st-permission{background:rgba(249,115,22,.14);color:var(--permission);border-color:rgba(249,115,22,.3);}
.st-mission{background:rgba(59,130,246,.14);color:var(--mission);border-color:rgba(59,130,246,.3);}
.st-stage{background:rgba(168,85,247,.14);color:var(--stage);border-color:rgba(168,85,247,.3);}
.st-reverse{background:rgba(107,114,128,.14);color:var(--reverse);border-color:rgba(107,114,128,.3);}
.td-actions{text-align:right;white-space:nowrap;}
.btn-edit,.btn-del{background:none;border:none;cursor:pointer;padding:.28rem .4rem;border-radius:4px;font-size:.86rem;transition:all .2s;}
.btn-edit{color:rgba(255,255,255,.3);}
.btn-edit:hover{color:var(--gold);background:rgba(201,162,39,.1);}
.btn-del{color:rgba(255,255,255,.18);}
.btn-del:hover{color:var(--absent);background:rgba(239,68,68,.1);}

/* ── ARMEE COLORS ── */
.ar-marine{background:rgba(61,214,245,.1);color:#3dd6f5;border:1px solid rgba(61,214,245,.3);}
.ar-terre{background:rgba(101,163,13,.1);color:#84cc16;border:1px solid rgba(101,163,13,.3);}
.ar-douanes{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.ar-police{background:rgba(251,146,60,.1);color:#fb923c;border:1px solid rgba(251,146,60,.3);}
.ar-civil{background:rgba(201,162,39,.1);color:var(--gold);border:1px solid rgba(201,162,39,.3);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;}
.modal{background:var(--navy2);border:1px solid var(--border-gold);border-radius:12px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.6);}
.modal-header{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-family:"Rajdhani",sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
.btn-close{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.38);font-size:1.25rem;line-height:1;padding:.2rem;transition:color .2s;}
.btn-close:hover{color:var(--white);}
.modal-body{padding:1.4rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;}
.form-group{display:flex;flex-direction:column;gap:.35rem;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:.67rem;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.38);font-family:"Rajdhani",sans-serif;font-weight:700;}
.form-group input,.form-group select{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;color:var(--white);font-family:"Source Sans 3",sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus{border-color:rgba(201,162,39,.6);}
.form-group select option{background:var(--navy2);}
.status-picker{display:flex;flex-wrap:wrap;gap:.45rem;}
.status-pick-btn{padding:.35rem .75rem;border-radius:20px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;font-family:"Rajdhani",sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.8px;transition:all .2s;}
.status-pick-btn.selected-present{background:rgba(34,197,94,.2);color:var(--present);border-color:var(--present);}
.status-pick-btn.selected-absent{background:rgba(239,68,68,.2);color:var(--absent);border-color:var(--absent);}
.status-pick-btn.selected-permission{background:rgba(249,115,22,.2);color:var(--permission);border-color:var(--permission);}
.status-pick-btn.selected-mission{background:rgba(59,130,246,.2);color:var(--mission);border-color:var(--mission);}
.status-pick-btn.selected-stage{background:rgba(168,85,247,.2);color:var(--stage);border-color:var(--stage);}
.status-pick-btn.selected-reverse{background:rgba(107,114,128,.2);color:var(--reverse);border-color:var(--reverse);}
.modal-footer{padding:.9rem 1.4rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.7rem;}
.btn-cancel{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);cursor:pointer;padding:.5rem 1.1rem;border-radius:6px;font-family:"Rajdhani",sans-serif;font-weight:700;letter-spacing:1px;font-size:.88rem;transition:all .2s;}
.btn-cancel:hover{background:rgba(255,255,255,.12);}
.btn-save{background:var(--gold);border:none;color:var(--navy);cursor:pointer;padding:.5rem 1.4rem;border-radius:6px;font-family:"Rajdhani",sans-serif;font-weight:700;letter-spacing:1px;font-size:.88rem;transition:all .2s;}
.btn-save:hover{background:var(--gold2);transform:translateY(-1px);}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:3rem;color:rgba(255,255,255,.2);}
.empty-state .icon{font-size:2.5rem;margin-bottom:.8rem;}

/* ── NOTIF ── */
.notif{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--gold);color:var(--navy);padding:.65rem 1.1rem;border-radius:8px;font-family:"Rajdhani",sans-serif;font-weight:700;font-size:.88rem;box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:300;animation:slideIn .3s ease;}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:rgba(255,255,255,.03);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(201,162,39,.4);}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  header{padding:.65rem 1rem;min-height:60px;}
  .logo img{height:42px;width:42px;}
  .logo-text h1{font-size:.95rem;letter-spacing:1px;}
  .logo-text h1 span{font-size:.6rem;letter-spacing:2px;}
  .btn{padding:.42rem .8rem;font-size:.78rem;}
  .armee-block{flex:1 0 100px;padding:.5rem .75rem;}
  .armee-block .ab-icon{font-size:1.1rem;}
  .armee-block .ab-num{font-size:1.15rem;}
  .armee-block .ab-name{font-size:.58rem;}
  .toolbar{padding:.65rem 1rem;}
  main{padding:1rem;}
  .form-grid{grid-template-columns:1fr;}
}
@media(max-width:520px){
  .header-actions .btn-outline span{display:none;}
  .armee-block{flex:0 0 calc(50% - 1px);}
  .armee-row{display:grid;grid-template-columns:1fr 1fr;}
  .armee-block{border-right:1px solid var(--border) !important;border-bottom:1px solid var(--border);}
  thead th:nth-child(4),tbody td:nth-child(4),
  thead th:nth-child(5),tbody td:nth-child(5){display:none;}
}
@media(max-width:380px){
  thead th:nth-child(6),tbody td:nth-child(6){display:none;}
}
</style>
</head>

<script>

  {id:32,grade:'MT1',nom:'ADEGBITE Crédo',mat:'39023',tel:'0162017828',fonction:'COURSIER',armee:'Marine Nationale',obs:'',status:'present'},
  {id:33,grade:'MT1',nom:'AGBANGBE Armelle',mat:'37536',tel:'0197358624',fonction:'SECRÉTAIRE',armee:'Marine Nationale',obs:'',status:'present'},
  {id:34,grade:'MT1',nom:'TONOUKOUIN Christel',mat:'42677',tel:'0165665853',fonction:'SECRÉTAIRE & ASSISTANTE DU C/CAB',armee:'Marine Nationale',obs:'',status:'present'}

let personnel=[],editingId=null,selectedStatus='present',groupByArmee=false,notifTimer=null;

function loadData(){
  try{ const s=localStorage.getItem('premar_v3'); personnel=s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_DATA)); if(!s)saveData(); }
  catch(e){ personnel=JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData(){ try{localStorage.setItem('premar_v3',JSON.stringify(personnel));}catch(e){} }

/* ── STATS + ARMÉE DASHBOARD ── */
function renderDashboard(){
  const c={total:personnel.length,present:0,absent:0,permission:0,mission:0,stage:0,reverse:0};
  const byArmee={};
  ARMEES_LIST.forEach(a=>byArmee[a.key]=0);
  personnel.forEach(p=>{
    if(c[p.status]!==undefined) c[p.status]++;
    if(byArmee[p.armee]!==undefined) byArmee[p.armee]++;
    else byArmee[p.armee]=(byArmee[p.armee]||0)+1;
  });
  const fa=document.getElementById('filterArmee').value;
  const fs=document.getElementById('filterStatus').value;

  // Situations row
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-card s-total${!fs?'  active':''}" onclick="setFilter('')"><div class="num">${c.total}</div><div class="lbl">Total</div></div>
    <div class="stat-card s-present${fs==='present'?' active':''}" onclick="setFilter('present')"><div class="num">${c.present}</div><div class="lbl">Présents</div></div>
    <div class="stat-card s-absent${fs==='absent'?' active':''}" onclick="setFilter('absent')"><div class="num">${c.absent}</div><div class="lbl">Absents</div></div>
    <div class="stat-card s-permission${fs==='permission'?' active':''}" onclick="setFilter('permission')"><div class="num">${c.permission}</div><div class="lbl">Permission</div></div>
    <div class="stat-card s-mission${fs==='mission'?' active':''}" onclick="setFilter('mission')"><div class="num">${c.mission}</div><div class="lbl">Mission</div></div>
    <div class="stat-card s-stage${fs==='stage'?' active':''}" onclick="setFilter('stage')"><div class="num">${c.stage}</div><div class="lbl">Stage</div></div>
    <div class="stat-card s-reverse${fs==='reverse'?' active':''}" onclick="setFilter('reverse')"><div class="num">${c.reverse}</div><div class="lbl">Reversé</div></div>
  `;

  // Armée row
  const pct=(n)=>personnel.length>0?Math.round(n/personnel.length*100):0;
  document.getElementById('armeeRow').innerHTML = ARMEES_LIST.map(a=>{
    const n=byArmee[a.key]||0;
    const isActive=fa===a.key;
    return `<div class="armee-block${isActive?' active-armee':''}" style="--ab-color:${a.color}" onclick="setArmee('${a.key}')">
      <div class="ab-icon">${a.icon}</div>
      <div class="ab-info">
        <div class="ab-num">${n}</div>
        <div class="ab-name">${a.key}</div>
      </div>
      <div class="ab-bar" style="width:${pct(n)}%;position:absolute;bottom:0;left:0;height:2px;background:${a.color};opacity:.5;"></div>
    </div>`;
  }).join('');
}

function setFilter(val){ document.getElementById('filterStatus').value=val; renderTable(); }
function setArmee(val){
  const sel=document.getElementById('filterArmee');
  sel.value=(sel.value===val)?'':val;
  renderTable();
}

/* ── TABLE ── */
function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const fa=document.getElementById('filterArmee').value;
  const fs=document.getElementById('filterStatus').value;
  return personnel.filter(p=>
    (!q||[p.nom,p.grade,p.fonction,p.mat].some(x=>(x||'').toLowerCase().includes(q)))&&
    (!fa||p.armee===fa)&&(!fs||p.status===fs)
  );
}

function renderRow(p,idx){
  const a=ARMEE_MAP[p.armee]||{cls:'ar-civil'};
  return `<tr>
    <td class="td-num">${idx+1}</td>
    <td class="td-grade">${p.grade||'—'}</td>
    <td class="td-name">${p.nom}</td>
    <td class="td-mat">${p.mat||'—'}</td>
    <td class="td-tel">${p.tel||'—'}</td>
    <td class="td-fonction">${p.fonction||'—'}</td>
    <td><span class="armee-badge ${a.cls}">${p.armee}</span></td>
    <td><span class="status-badge st-${p.status}" onclick="quickStatus(${p.id})" title="Cliquer pour changer">${STATUS_DOT[p.status]} ${STATUS_LABELS[p.status]}</span></td>
    <td class="td-actions">
      <button class="btn-edit" onclick="openModal(${p.id})" title="Modifier">✏️</button>
      <button class="btn-del" onclick="deleteAgent(${p.id})" title="Supprimer">🗑️</button>
    </td>
  </tr>`;
}

function renderTable(){
  const filtered=getFiltered();
  renderDashboard();
  updateExportBar(filtered);
  const thead=`<thead><tr>
    <th>#</th><th>Grade</th><th>Nom & Prénoms</th><th>Matricule</th>
    <th>Téléphone</th><th>Fonction</th><th>Armée</th><th>Situation</th><th></th>
  </tr></thead>`;
  const main=document.getElementById('mainContent');
  if(!filtered.length){main.innerHTML=`<div class="empty-state"><div class="icon">🔍</div><p>Aucun agent trouvé</p></div>`;return;}
  if(groupByArmee){
    const groups={};
    filtered.forEach(p=>{if(!groups[p.armee])groups[p.armee]=[];groups[p.armee].push(p);});
    const order=ARMEES_LIST.map(a=>a.key);
    const keys=[...order.filter(k=>groups[k]),...Object.keys(groups).filter(k=>!order.includes(k))];
    main.innerHTML=keys.map(k=>`
      <div class="group-header"><h2>${k}</h2><span class="group-count">${groups[k].length} agent${groups[k].length>1?'s':''}</span></div>
      <div class="table-wrap"><table>${thead}<tbody>${groups[k].map((p,i)=>renderRow(p,i)).join('')}</tbody></table></div>`).join('');
  } else {
    main.innerHTML=`<div class="table-wrap"><table>${thead}<tbody>${filtered.map((p,i)=>renderRow(p,i)).join('')}</tbody></table></div>`;
  }
}

function updateExportBar(filtered){
  const fa=document.getElementById('filterArmee').value;
  const fs=document.getElementById('filterStatus').value;
  const q=document.getElementById('searchInput').value;
  const bar=document.getElementById('exportBar');
  if(fa||fs||q){
    const parts=[];
    if(fa) parts.push('Corps : '+fa);
    if(fs) parts.push('Situation : '+STATUS_LABELS[fs]);
    if(q) parts.push('Recherche : "'+q+'"');
    bar.style.display='flex';
    bar.innerHTML=`<span>⚙ FILTRE ACTIF :</span> <strong>${parts.join(' | ')}</strong> <span>— ${filtered.length} agent(s)</span>`;
  } else { bar.style.display='none'; }
}

function quickStatus(id){
  const p=personnel.find(x=>x.id===id);if(!p)return;
  const idx=STATUSES.indexOf(p.status);
  p.status=STATUSES[(idx+1)%STATUSES.length];
  saveData();renderTable();
  notify(`${p.nom} → ${STATUS_LABELS[p.status]}`);
}
function deleteAgent(id){
  const p=personnel.find(x=>x.id===id);
  if(!p||!confirm(`Supprimer ${p.nom} ?`))return;
  personnel=personnel.filter(x=>x.id!==id);
  saveData();renderTable();notify('Agent supprimé');
}
function toggleGroup(){
  groupByArmee=!groupByArmee;
  document.getElementById('groupBtn').classList.toggle('active',groupByArmee);
  renderTable();
}

/* ── MODAL ── */
function buildStatusPicker(){
  document.getElementById('statusPicker').innerHTML=STATUSES.map(s=>
    `<button class="status-pick-btn${selectedStatus===s?' selected-'+s:''}" onclick="pickStatus('${s}')">${STATUS_DOT[s]} ${STATUS_LABELS[s]}</button>`).join('');
}
function pickStatus(s){selectedStatus=s;buildStatusPicker();}
function openModal(id){
  editingId=id||null;
  document.getElementById('modalTitle').textContent=id?"MODIFIER L'AGENT":"NOUVEL AGENT";
  if(id){const p=personnel.find(x=>x.id===id);
    document.getElementById('f_grade').value=p.grade;
    document.getElementById('f_nom').value=p.nom;
    document.getElementById('f_mat').value=p.mat;
    document.getElementById('f_tel').value=p.tel;
    document.getElementById('f_armee').value=p.armee;
    document.getElementById('f_fonction').value=p.fonction;
    document.getElementById('f_obs').value=p.obs;
    selectedStatus=p.status;
  } else {
    ['f_grade','f_nom','f_mat','f_tel','f_fonction','f_obs'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('f_armee').value='Marine Nationale';
    selectedStatus='present';
  }
  buildStatusPicker();
  document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(){document.getElementById('modalOverlay').style.display='none';}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function saveAgent(){
  const nom=document.getElementById('f_nom').value.trim();
  if(!nom){alert('Le nom est obligatoire.');return;}
  const d={grade:document.getElementById('f_grade').value.trim(),nom,
    mat:document.getElementById('f_mat').value.trim(),tel:document.getElementById('f_tel').value.trim(),
    armee:document.getElementById('f_armee').value,fonction:document.getElementById('f_fonction').value.trim(),
    obs:document.getElementById('f_obs').value.trim(),status:selectedStatus};
  if(editingId){Object.assign(personnel.find(x=>x.id===editingId),d);notify('Agent mis à jour ✓');}
  else{const newId=Math.max(0,...personnel.map(x=>x.id))+1;personnel.push({id:newId,...d});notify('Agent ajouté ✓');}
  saveData();closeModal();renderTable();
}

/* ── EXPORT CSV ── */
function exportCSV(){
  const filtered=getFiltered();
  const fa=document.getElementById('filterArmee').value;
  const fs=document.getElementById('filterStatus').value;
  const q=document.getElementById('searchInput').value;
  const bom='\uFEFF';
  const headers=['N°','Grade','Nom et Prénoms','Matricule','Téléphone','Fonction','Armée de Provenance','Situation','Observation'];
  const rows=filtered.map((p,i)=>[i+1,p.grade,p.nom,p.mat,p.tel,p.fonction,p.armee,STATUS_LABELS[p.status],p.obs]);
  const csv=bom+[headers,...rows].map(r=>r.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const parts=[];if(fa)parts.push(fa.replace(/ /g,'_'));if(fs)parts.push(STATUS_LABELS[fs]);if(q)parts.push('recherche');
  a.href=url;a.download='PREMAR_Personnel'+(parts.length?'_'+parts.join('_'):'_complet')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
  notify('Export : '+filtered.length+' agent(s)');
}

/* ── NOTIF ── */
function notify(msg){
  const el=document.getElementById('notif');el.textContent=msg;el.style.display='block';
  clearTimeout(notifTimer);notifTimer=setTimeout(()=>{el.style.display='none';},2800);
}

loadData();renderDashboard();renderTable();
</script>
